name: Refresh & Deploy Dashboard

on:
  # ── Automatic: every day at 8 AM UTC ──
  schedule:
    - cron: '0 8 * * *'

  # ── On push to main (manual edits, hotfixes) ──
  push:
    branches: [ main ]

  # ── Manual trigger from the Actions tab ──
  workflow_dispatch:

permissions:
  contents: write      # needed to commit updated HTML + data back to main
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Check out the repo (full history so we can push back)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Run the build script — reads Slack, calls Claude, patches HTML
      - name: Refresh dashboard from Slack
        env:
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/build_dashboard.py

      # 4. Commit any changes (new cards + updated processed_ts.json) back to main
      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-innovations-dashboard.html data/processed_ts.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-refresh dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi

      # 5. Deploy to GitHub Pages (github.com)
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 6. Mirror to git.soma.salesforce.com via gh-pages branch
      - name: Push to git.soma gh-pages branch
        env:
          SOMA_TOKEN:    ${{ secrets.SOMA_TOKEN }}
          SOMA_USERNAME: ${{ secrets.SOMA_USERNAME }}
        run: |
          # Configure git identity
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add git.soma as a second remote (credentials embedded in URL)
          git remote add soma \
            "https://${SOMA_USERNAME}:${SOMA_TOKEN}@git.soma.salesforce.com/${SOMA_USERNAME}/ai-innovations-dashboard.git"

          # Create an orphan gh-pages branch with only the dashboard HTML
          # (keeps the branch clean — no Python scripts or workflow files exposed)
          git checkout --orphan gh-pages-deploy
          # On an orphan branch there is no HEAD, so use git rm to clear the index
          git rm -rf --cached . --quiet

          # Stage only the files that should be publicly visible
          git add ai-innovations-dashboard.html

          git commit -m "chore: sync dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"

          # Force-push to gh-pages on git.soma
          git push soma gh-pages-deploy:gh-pages --force

          echo "✅ Synced to git.soma gh-pages branch."

          # Return to main for any subsequent steps
          git checkout main
