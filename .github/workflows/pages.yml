name: Deploy to GitHub Pages

on:
  # Run automatically every day at 8 AM UTC
  schedule:
    - cron: '0 8 * * *'

  # Also run whenever the HTML file is pushed
  push:
    branches: [ main ]
    paths:
      - 'ai-innovations-dashboard.html'
      - '.github/workflows/pages.yml'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stamp refresh date into HTML
        env:
          BUILD_DATE: ${{ github.run_id }}
        run: |
          DATE=$(date -u '+%b %d, %Y %H:%M UTC')
          sed -i "s|Last refreshed: <strong id=\"last-refresh\"></strong>|Last refreshed: <strong id=\"last-refresh\">${DATE}</strong>|g" ai-innovations-dashboard.html
          echo "Stamped: ${DATE}"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
